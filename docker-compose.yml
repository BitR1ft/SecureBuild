version: '3.8'

services:
  securebuild-dashboard:
    build: .
    container_name: securebuild-dashboard
    command: dashboard --host 0.0.0.0 --port 5000
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
      - ./logs:/app/logs
    environment:
      - FLASK_SECRET_KEY=${FLASK_SECRET_KEY:?FLASK_SECRET_KEY must be set (use .env file or export)}
      - DB_PATH=/app/data/securebuild.db
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:5000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  securebuild-scanner:
    build: .
    container_name: securebuild-scanner
    command: scan /scan -o /reports
    volumes:
      - ${REPO_PATH:-.}:/scan:ro
      - ./reports:/reports
      - ./data:/app/data
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - NVD_API_KEY=${NVD_API_KEY:-}
    profiles:
      - scan
