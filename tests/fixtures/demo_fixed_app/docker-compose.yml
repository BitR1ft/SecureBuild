version: '3'
services:
  web:
    build: .
    ports:
      - "5000:5000"
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    environment:
      - DB_PASSWORD=${DB_PASSWORD}
      - SECRET_KEY=${SECRET_KEY}
      - FLASK_SECRET_KEY=${FLASK_SECRET_KEY}
      - AWS_ACCESS_KEY=${AWS_ACCESS_KEY}
      - AWS_SECRET_KEY=${AWS_SECRET_KEY}
